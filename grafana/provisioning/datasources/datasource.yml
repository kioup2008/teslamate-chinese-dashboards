apiVersion: 1

datasources:
  - name: TeslaMate
    type: grafana-postgresql-datasource
    uid: TeslaMate
    access: proxy
    url: ${DATABASE_HOST}:${DATABASE_PORT:-5432}
    database: ${DATABASE_NAME}
    user: ${DATABASE_USER}
    jsonData:
      sslmode: 'disable'
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1400
      timescaledb: false
    secureJsonData:
      password: '${DATABASE_PASS}'
    version: 1
    editable: false
